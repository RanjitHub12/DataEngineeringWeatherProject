<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Forecast Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- ================================================================ -->
    <!-- Global Styles -->
    <!-- ================================================================ -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Manrope', 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background:
          radial-gradient(circle at 20% 10%, rgba(118, 168, 255, 0.4), transparent 55%),
          radial-gradient(circle at 80% 0%, rgba(255, 211, 169, 0.45), transparent 55%),
          linear-gradient(160deg, #e6f0ff 0%, #d9e8ff 45%, #cfe2ff 100%);
        min-height: 100vh;
      }
      
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <!-- ================================================================ -->
    <!-- React root element -->
    <!-- ================================================================ -->
    <div id="root"></div>
    
    <!-- ================================================================ -->
    <!-- Vite will inject the script here -->
    <!-- ================================================================ -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
